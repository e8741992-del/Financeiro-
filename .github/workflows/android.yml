name: Android Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: |
          # Procura onde está o package.json e entra na pasta
          ROOT_DIR=$(find . -name "package.json" -not -path "*/node_modules/*" | xargs dirname)
          echo "Projeto encontrado em: $ROOT_DIR"
          cd "$ROOT_DIR"
          npm install
          npx capacitor sync android

      - name: Build Android App
        run: |
          # Procura onde está a pasta do Android e o gradlew
          GRADLE_DIR=$(find . -name "gradlew" -not -path "*/node_modules/*" | xargs dirname)
          echo "Pasta Android encontrada em: $GRADLE_DIR"
          cd "$GRADLE_DIR"
          # Limpa o ícone duplicado que causou erro antes
          find . -name "ic_launcher.png" -path "*/res/raw/*" -delete
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: "**/build/outputs/bundle/release/*.aab"
          include-hidden-files: true
