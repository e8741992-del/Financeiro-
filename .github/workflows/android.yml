name: Android Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: |
          cd AppAndroid
          npm install
          # Usando o comando direto do capacitor para evitar erro de npx
          ./node_modules/.bin/cap sync android

      - name: Build Android App
        run: |
          cd AppAndroid/android
          # Apaga o arquivo que estava duplicado
          find . -name "ic_launcher.png" -path "*/res/raw/*" -delete
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: AppAndroid/android/app/build/outputs/bundle/release/*.aab
          include-hidden-files: true
