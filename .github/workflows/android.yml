name: Android Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies and Sync
        run: |
          # Lista arquivos para confirmar onde estamos
          ls -F
          # Verifica se package.json existe antes de rodar
          if [ -f "package.json" ]; then
            echo "package.json encontrado, instalando..."
            npm install
            npx cap sync android
          else
            echo "ERRO: package.json não encontrado na raiz!"
            exit 1
          fi

      - name: Build Android App
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/bundle/release/*.aab
          include-hidden-files: true
